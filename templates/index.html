<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home Assistant</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="/static/css/dashboard.css" rel="stylesheet"/>
</head>
<body class="bg-dark text-light">

<!-- ── Top Navigation ────────────────────────────────────────── -->
<nav class="navbar navbar-dark bg-primary px-3">
  <a class="navbar-brand d-flex align-items-center gap-2" href="#">
    <i class="bi bi-house-heart-fill fs-4"></i>
    <span class="fw-bold">Home Assistant</span>
  </a>
  <div class="d-flex align-items-center gap-3">
    <span id="wlan-badge" class="badge bg-secondary">
      <i class="bi bi-wifi-off"></i> Disconnected
    </span>
    <button class="btn btn-sm btn-outline-light" onclick="showWlanModal()">
      <i class="bi bi-wifi"></i> Network
    </button>
  </div>
</nav>

<!-- ── Main Content ───────────────────────────────────────────── -->
<div class="container-fluid py-4">

  <!-- Scan bar -->
  <div class="row mb-4">
    <div class="col-12 d-flex gap-2 align-items-center flex-wrap">
      <button class="btn btn-success" id="scan-btn" onclick="scanDevices()">
        <i class="bi bi-radar"></i> Scan Network
      </button>
      <input type="text" id="network-input" class="form-control w-auto"
             placeholder="CIDR (192.168.68.0/24) or connected SSID" title="Optional: subnet CIDR or connected SSID"/>
      <span id="scan-context"></span>
      <span id="scan-status" class="text-muted small"></span>
    </div>
    <div class="col-12 mt-1">
      <span id="scan-context-info"></span>
    </div>
  </div>

  <!-- Device cards grid -->
  <div class="row g-3" id="device-grid">
    <div class="col-12 text-center text-muted py-5" id="no-devices-msg">
      <i class="bi bi-radar fs-1 d-block mb-2"></i>
      Click <strong>Scan Network</strong> to discover devices on your WLAN.
    </div>
  </div>

</div>

<!-- ── WLAN Modal ─────────────────────────────────────────────── -->
<div class="modal fade" id="wlanModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark text-light border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title"><i class="bi bi-wifi"></i> WLAN Networks</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <button class="btn btn-sm btn-outline-info mb-3" onclick="loadNetworks()">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
        <div id="network-list">
          <p class="text-muted">Click Refresh to scan for networks…</p>
        </div>

        <hr class="border-secondary"/>
        <h6>Connect to Network</h6>
        <div class="row g-2">
          <div class="col-sm-5">
            <input type="text" id="connect-ssid" class="form-control bg-dark text-light border-secondary"
                   placeholder="SSID"/>
          </div>
          <div class="col-sm-5">
            <input type="password" id="connect-password" class="form-control bg-dark text-light border-secondary"
                   placeholder="Password (leave blank for open)"/>
          </div>
          <div class="col-sm-2">
            <button class="btn btn-primary w-100" onclick="connectWlan()">Connect</button>
          </div>
        </div>
        <div id="connect-result" class="mt-2"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Device Control Modal ───────────────────────────────────── -->
<div class="modal fade" id="deviceModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark text-light border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="device-modal-title">Device Control</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="device-modal-body">
        Loading…
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
